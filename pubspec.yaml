name: sanskar_varga_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# 🔧 App Icon Config
flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"

# 🔧 Flutter Config (IMPORTANT)
flutter:
  uses-material-design: true

  assets:
    - assets/icon.png